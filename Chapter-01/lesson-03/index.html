<!DOCTYPE html>
<html lang="en">
<!-- 
    WHAT: Dynamic Multi-Student & Multi-Subject Input Form.
    WHY: To allow users to define their own curriculum (subjects) before entering marks.
    HOW: 
        1. User defines "How many subjects" and "What are they".
        2. JavaScript generates the mark inputs for every student based on those subjects.
-->
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lesson 03 - Classroom Grading (Flexible)</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: #f0f2f5; padding: 20px; }
        .main-container { max-width: 900px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: #1a73e8; }
        
        .section-box { border: 1px solid #dfe3e8; padding: 20px; border-radius: 8px; margin-bottom: 25px; background: #fff; }
        .section-title { font-weight: bold; color: #1a73e8; margin-bottom: 15px; display: block; font-size: 1.1rem; border-bottom: 2px solid #eef2f7; padding-bottom: 5px; }

        .student-block { border-left: 5px solid #34a853; padding: 15px; background: #f9fbf9; margin-bottom: 15px; border-radius: 0 8px 8px 0; position: relative; }
        
        .grid-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 10px; margin-bottom: 10px; }
        .form-group { margin-bottom: 10px; }
        label { display: block; font-weight: 600; margin-bottom: 5px; font-size: 0.85rem; color: #555; }
        input { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        
        .btn { padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .btn-add { background: #34a853; color: white; }
        .btn-setup { background: #5f6368; color: white; margin-left: 10px; }
        .btn-submit { background: #1a73e8; color: white; width: 100%; margin-top: 20px; font-size: 1.1rem; }
    </style>
</head>
<body>

<div class="main-container">
    <h1>Classroom Grading System</h1>
    <p style="text-align: center; color: #666;">Lesson 03 Update: Flexible Subjects</p>

    <form action="process.php" method="POST" id="gradingForm">
        
        <!-- STEP 1: DEFINE SUBJECTS -->
        <div class="section-box">
            <span class="section-title">Step 1: Define Subjects</span>
            <div class="form-group" style="display: flex; align-items: flex-end;">
                <div style="flex: 1;">
                    <label>How many subjects?</label>
                    <input type="number" id="num_subjects" value="3" min="1" max="10">
                </div>
                <button type="button" class="btn btn-setup" onclick="setupSubjects()">Update Subject List</button>
            </div>
            
            <div id="subjectNameContainer" class="grid-row">
                <!-- Subject names generated here -->
            </div>
        </div>

        <!-- STEP 2: ENTER STUDENT MARKS -->
        <div class="section-box">
            <span class="section-title">Step 2: Student Marks</span>
            <div id="studentList">
                <!-- Student blocks generated here -->
            </div>
            <button type="button" class="btn btn-add" onclick="addStudent()">+ Add Student</button>
        </div>

        <button type="submit" class="btn btn-submit">Generate Classroom Report</button>
    </form>
</div>

<script>
    let subjects = [];
    let studentCount = 0;

    // INITIAL SETUP
    window.onload = () => {
        setupSubjects();
        addStudent();
    };

    /**
     * WHAT: Generates the labels for our subjects.
     * WHY: To allow users to name their subjects dynamically.
     */
    function setupSubjects() {
        const count = document.getElementById('num_subjects').value;
        const container = document.getElementById('subjectNameContainer');
        container.innerHTML = '';
        subjects = [];

        for (let i = 0; i < count; i++) {
            const div = document.createElement('div');
            const defaultName = i === 0 ? 'Mathematics' : (i === 1 ? 'Science' : (i === 3 ? 'English' : `Subject ${i+1}`));
            div.innerHTML = `
                <label>Subject ${i+1} Name</label>
                <input type="text" class="subj-name-input" value="${defaultName}" oninput="syncSubjectNames()">
            `;
            container.appendChild(div);
            subjects.push(defaultName);
        }
        syncSubjectNames();
    }

    /**
     * WHAT: Updates the labels in the student rows.
     * WHY: So if a user changes "Science" to "Biology", all student rows update instantly.
     */
    function syncSubjectNames() {
        const inputs = document.querySelectorAll('.subj-name-input');
        subjects = Array.from(inputs).map(inp => inp.value);
        
        // Update all existing student blocks
        const labels = document.querySelectorAll('.dynamic-subj-label');
        labels.forEach((label, index) => {
            const subjIndex = index % subjects.length;
            label.innerText = subjects[subjIndex];
            // Also update the hidden name field sent to PHP
            label.nextElementSibling.value = subjects[subjIndex];
        });

        // If subjects count changed, we might need to recreate student inner rows
        // (For simplicity in this lesson, we recommend users setup subjects FIRST).
    }

    /**
     * WHAT: Adds a student block.
     * WHY: To handle multiple people in the class.
     */
    function addStudent() {
        const list = document.getElementById('studentList');
        const sIndex = studentCount;
        const div = document.createElement('div');
        div.className = 'student-block';
        
        let subjectsHtml = '';
        subjects.forEach((subj, subIdx) => {
            subjectsHtml += `
                <div class="form-group">
                    <label class="dynamic-subj-label">${subj}</label>
                    <input type="hidden" name="marks[${sIndex}][subjects][]" value="${subj}">
                    <input type="number" name="marks[${sIndex}][scores][]" min="0" max="100" placeholder="Mark" required>
                </div>
            `;
        });

        div.innerHTML = `
            <h3>Student #${sIndex + 1}</h3>
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" name="student_names[]" placeholder="Enter name" required>
            </div>
            <div class="grid-row">
                ${subjectsHtml}
            </div>
        `;
        list.appendChild(div);
        studentCount++;
    }
</script>

</body>
</html>
