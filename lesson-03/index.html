<!DOCTYPE html>
<html lang="en">
<!-- 
    WHAT: Dynamic Multi-Student Input Form.
    WHY: To process an entire classroom's data in one submission.
    HOW: Using a mix of HTML for structure and simple JavaScript to "clone" student input blocks.
-->
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lesson 03 - Classroom Grading System</title>
    <style>
        /* UI Styling */
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: #f0f2f5; padding: 20px; }
        .main-container { max-width: 800px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: #1a73e8; }
        
        .student-block { border: 2px solid #eef2f7; padding: 20px; border-radius: 10px; margin-bottom: 20px; background: #fafafa; position: relative; }
        .student-block h3 { margin-top: 0; color: #444; border-bottom: 1px solid #ddd; padding-bottom: 5px; }
        
        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; font-size: 0.9rem; }
        input { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        
        .subject-row { display: grid; grid-template-columns: 2fr 1fr; gap: 10px; margin-bottom: 10px; }
        
        .btn { padding: 12px 20px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 1rem; transition: 0.3s; }
        .btn-add { background: #34a853; color: white; margin-bottom: 20px; }
        .btn-add:hover { background: #2d8e47; }
        .btn-submit { background: #1a73e8; color: white; width: 100%; }
        .btn-submit:hover { background: #1557b0; }
        
        .remove-btn { position: absolute; top: 10px; right: 10px; background: #ea4335; color: white; border: none; padding: 5px 10px; border-radius: 5px; cursor: pointer; font-size: 0.8rem; }
    </style>
</head>
<body>

<div class="main-container">
    <h1>Classroom Grading System</h1>
    <p style="text-align: center; color: #666;">Lesson 03: Multi-Student Processing (Nested Arrays)</p>

    <form action="process.php" method="POST" id="gradingForm">
        <div id="studentList">
            <!-- Initial Student Block -->
            <div class="student-block">
                <h3>Student #1</h3>
                <div class="form-group">
                    <label>Student Name:</label>
                    <input type="text" name="student_names[]" placeholder="Enter student name" required>
                </div>
                
                <label>Subjects & Marks:</label>
                <div class="subject-row">
                    <input type="text" name="marks[0][subjects][]" value="Mathematics" readonly>
                    <input type="number" name="marks[0][scores][]" min="0" max="100" placeholder="Mark" required>
                </div>
                <div class="subject-row">
                    <input type="text" name="marks[0][subjects][]" value="Science" readonly>
                    <input type="number" name="marks[0][scores][]" min="0" max="100" placeholder="Mark" required>
                </div>
                <div class="subject-row">
                    <input type="text" name="marks[0][subjects][]" value="English" readonly>
                    <input type="number" name="marks[0][scores][]" min="0" max="100" placeholder="Mark" required>
                </div>
            </div>
        </div>

        <!-- 
            WHAT: Add Student Button.
            WHY: To provide a dynamic user experience (UX).
            HOW: Calls a JS function to append a new block to the DOM.
        -->
        <button type="button" class="btn btn-add" onclick="addStudent()">+ Add Another Student</button>
        
        <button type="submit" class="btn btn-submit">Process All Results</button>
    </form>
</div>

<script>
    let studentCount = 1;

    /**
     * WHAT: A Javascript function to add student fields.
     * WHY: To create a flexible form that grows with the user's needs.
     * HOW: Uses template literals to inject new HTML into the 'studentList' div.
     */
    function addStudent() {
        const list = document.getElementById('studentList');
        const index = studentCount;
        const div = document.createElement('div');
        div.className = 'student-block';
        div.innerHTML = `
            <button type="button" class="remove-btn" onclick="this.parentElement.remove()">Remove</button>
            <h3>Student #${index + 1}</h3>
            <div class="form-group">
                <label>Student Name:</label>
                <input type="text" name="student_names[]" placeholder="Enter student name" required>
            </div>
            <label>Subjects & Marks:</label>
            <div class="subject-row">
                <input type="text" name="marks[${index}][subjects][]" value="Mathematics" readonly>
                <input type="number" name="marks[${index}][scores][]" min="0" max="100" placeholder="Mark" required>
            </div>
            <div class="subject-row">
                <input type="text" name="marks[${index}][subjects][]" value="Science" readonly>
                <input type="number" name="marks[${index}][scores][]" min="0" max="100" placeholder="Mark" required>
            </div>
            <div class="subject-row">
                <input type="text" name="marks[${index}][subjects][]" value="English" readonly>
                <input type="number" name="marks[${index}][scores][]" min="0" max="100" placeholder="Mark" required>
            </div>
        `;
        list.appendChild(div);
        studentCount++;
    }
</script>

</body>
</html>
