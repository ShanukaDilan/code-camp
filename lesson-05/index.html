<!DOCTYPE html>
<html lang="en">
<!-- 
    WHAT: Classroom Ranking Input Form.
    WHY: To process all students and compare their performance.
    HOW: A two-step setup for subjects and students (as seen in Lesson 04).
-->
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lesson 05 - Classroom Ranking</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; padding: 20px; }
        .wrapper { max-width: 800px; margin: auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 40px rgba(0,0,0,0.1); }
        h2 { color: #1a73e8; text-align: center; }
        .section { margin-bottom: 30px; border: 1px solid #eee; padding: 20px; border-radius: 10px; }
        .section-h { font-weight: bold; margin-bottom: 15px; color: #1a73e8; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 15px; }
        .student-item { padding: 15px; border-left: 4px solid #34a853; background: #f9f9f9; margin-bottom: 15px; position: relative; }
        label { display: block; font-weight: bold; font-size: 0.8rem; margin-bottom: 5px; color: #666; }
        input { width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; }
        .btn { padding: 10px 20px; border-radius: 5px; border: none; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn-add { background: #34a853; color: white; display: block; margin: 10px auto; }
        .btn-primary { background: #1a73e8; color: white; width: 100%; font-size: 1rem; margin-top: 20px; }
    </style>
</head>
<body>

<div class="wrapper">
    <h2>🏆 Classroom Leaderboard</h2>
    <p style="text-align: center; color: #777;">Lesson 05: Sorting & Ranking</p>

    <form action="process.php" method="POST">
        <!-- Step 1 -->
        <div class="section">
            <div class="section-h">Step 1: Curriculum Setup</div>
            <div style="display: flex; gap: 10px; align-items: flex-end;">
                <div style="flex: 1;">
                    <label>How many subjects?</label>
                    <input type="number" id="scount" value="3" min="1" max="5">
                </div>
                <button type="button" class="btn" style="background: #eef2f7;" onclick="genSubjects()">Apply</button>
            </div>
            <div id="subNames" class="grid" style="margin-top: 15px;"></div>
        </div>

        <!-- Step 2 -->
        <div class="section">
            <div class="section-h">Step 2: Student Marks</div>
            <div id="studentList"></div>
            <button type="button" class="btn btn-add" onclick="addStudent()">+ Add Student</button>
        </div>

        <button type="submit" class="btn btn-primary">Calculate Ranking & Ranks</button>
    </form>
</div>

<script>
    let subjects = [];
    let count = 0;

    window.onload = () => { genSubjects(); addStudent(); };

    function genSubjects() {
        const n = document.getElementById('scount').value;
        const container = document.getElementById('subNames');
        container.innerHTML = ''; subjects = [];
        for (let i = 0; i < n; i++) {
            const name = i === 0 ? 'Math' : (i === 1 ? 'Science' : `Subject ${i+1}`);
            const div = document.createElement('div');
            div.innerHTML = `<label>Subject ${i+1}</label><input type="text" value="${name}" oninput="sync()">`;
            container.appendChild(div);
            subjects.push(name);
        }
        sync();
    }

    function sync() {
        const inputs = document.querySelectorAll('#subNames input');
        subjects = Array.from(inputs).map(i => i.value);
        document.querySelectorAll('.s-label').forEach((l, i) => {
            const idx = i % subjects.length;
            l.innerText = subjects[idx];
            l.nextElementSibling.value = subjects[idx];
        });
    }

    function addStudent() {
        const list = document.getElementById('studentList');
        const sIdx = count++;
        const div = document.createElement('div');
        div.className = 'student-item';
        let html = `<h3>Student #${sIdx+1}</h3><div style="margin-bottom:10px;"><label>Name</label><input type="text" name="names[]" required></div><div class="grid">`;
        subjects.forEach((s) => {
            html += `<div class="form-group"><label class="s-label">${s}</label><input type="hidden" name="marks[${sIdx}][s][]" value="${s}"><input type="number" name="marks[${sIdx}][v][]" min="0" max="100" required></div>`;
        });
        html += `</div>`;
        div.innerHTML = html;
        list.appendChild(div);
    }
</script>

</body>
</html>
