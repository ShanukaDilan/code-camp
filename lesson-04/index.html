<!DOCTYPE html>
<html lang="en">
<!-- 
    WHAT: Multi-Student Input Form (Continued from Lesson 03).
    WHY: We reuse the same frontend to focus on the Backend Refactoring (Functions).
-->
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lesson 04 - Modular Grading System</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #f8f9fa; padding: 30px; }
        .container { max-width: 600px; margin: auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 5px 20px rgba(0,0,0,0.05); }
        h2 { color: #007bff; text-align: center; }
        .student-inputs { border: 1px solid #ddd; padding: 15px; border-radius: 8px; margin-bottom: 20px; }
        .form-group { margin-bottom: 10px; }
        input { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { padding: 10px 15px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .btn-primary { background: #007bff; color: white; width: 100%; }
        .btn-outline { background: transparent; border: 1px solid #007bff; color: #007bff; margin-bottom: 15px; }
    </style>
</head>
<body>

<div class="container">
    <h2>Modular Grading System</h2>
    <p style="text-align: center; color: #666;">Lesson 04: PHP Functions & Include</p>

    <form action="process.php" method="POST" id="mainForm">
        <div id="studentContainer">
            <div class="student-inputs">
                <div class="form-group">
                    <label>Student Name:</label>
                    <input type="text" name="names[]" required placeholder="Student Name">
                </div>
                <div class="form-group">
                    <label>Marks (comma-separated, e.g. 75,60,85):</label>
                    <input type="text" name="marks_list[]" required placeholder="Comma separated marks">
                </div>
            </div>
        </div>

        <button type="button" class="btn-outline" onclick="addStudent()">+ Add Another Student</button>
        <button type="submit" class="btn-primary">Calculate All Grades</button>
    </form>
</div>

<script>
    function addStudent() {
        const container = document.getElementById('studentContainer');
        const div = document.createElement('div');
        div.className = 'student-inputs';
        div.innerHTML = `
            <div class="form-group">
                <label>Student Name:</label>
                <input type="text" name="names[]" required placeholder="Student Name">
            </div>
            <div class="form-group">
                <label>Marks (comma-separated):</label>
                <input type="text" name="marks_list[]" required placeholder="Comma separated marks">
            </div>
        `;
        container.appendChild(div);
    }
</script>

</body>
</html>
